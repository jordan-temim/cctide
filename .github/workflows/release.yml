name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  security-events: write

jobs:
  lint:
    uses: ./.github/workflows/lint.yml

  security:
    uses: ./.github/workflows/security.yml

  build-frontend:
    name: Build frontend
    needs: [lint, security]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          if-no-files-found: error

  build-mac:
    name: Build macOS (universal)
    needs: [build-frontend]
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Check signing secret
        run: |
          if [ -z "$KEY" ]; then
            echo "ERROR: TAURI_SIGNING_PRIVATE_KEY is not set — updater bundle will not be generated"
            exit 1
          fi
          echo "TAURI_SIGNING_PRIVATE_KEY is set (${#KEY} chars)"
        env:
          KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Skip frontend rebuild
        run: |
          tmp=$(mktemp)
          jq '.build.beforeBuildCommand = ""' src-tauri/tauri.conf.json > "$tmp" && mv "$tmp" src-tauri/tauri.conf.json

      - name: Build app bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build -- --target universal-apple-darwin

      - name: Collect artifacts
        run: |
          bundle=src-tauri/target/universal-apple-darwin/release/bundle
          mkdir upload
          cp "$bundle"/dmg/*.dmg upload/
          cp "$bundle"/macos/*.app.tar.gz upload/
          cp "$bundle"/macos/*.app.tar.gz.sig upload/
          ls -la upload/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: upload/
          if-no-files-found: error

  build-win:
    name: Build Windows
    needs: [build-frontend]
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Check signing secret
        shell: bash
        run: |
          if [ -z "$KEY" ]; then
            echo "ERROR: TAURI_SIGNING_PRIVATE_KEY is not set — updater bundle will not be generated"
            exit 1
          fi
          echo "TAURI_SIGNING_PRIVATE_KEY is set (${#KEY} chars)"
        env:
          KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Skip frontend rebuild
        shell: bash
        run: |
          tmp=$(mktemp)
          jq '.build.beforeBuildCommand = ""' src-tauri/tauri.conf.json > "$tmp" && mv "$tmp" src-tauri/tauri.conf.json

      - name: Build app bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build -- --bundles msi

      - name: Collect artifacts
        shell: bash
        run: |
          bundle=src-tauri/target/release/bundle
          mkdir upload
          cp "$bundle"/msi/*.msi upload/
          cp "$bundle"/msi/*.msi.sig upload/
          ls -la upload/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: upload/
          if-no-files-found: error

  release:
    name: Publish release
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-artifacts
          path: artifacts/

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
          path: artifacts/

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Generate latest.json
        run: |
          TAG="${GITHUB_REF_NAME}"          # e.g. v0.2.8 — used in asset URLs
          VERSION="${TAG#v}"                # e.g. 0.2.8 — must be plain semver
          TARGZ_NAME=$(ls artifacts/*.app.tar.gz | xargs basename)
          TARGZ_SIG=$(cat artifacts/*.app.tar.gz.sig)
          MSI_NAME=$(ls artifacts/*.msi | xargs basename)
          MSI_SIG=$(cat artifacts/*.msi.sig)
          jq -n \
            --arg version "$VERSION" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg mac_url "https://github.com/jordan-temim/cctide/releases/download/$TAG/$TARGZ_NAME" \
            --arg mac_sig "$TARGZ_SIG" \
            --arg msi_url "https://github.com/jordan-temim/cctide/releases/download/$TAG/$MSI_NAME" \
            --arg msi_sig "$MSI_SIG" \
            '{
              version: $version,
              pub_date: $pub_date,
              platforms: {
                "darwin-x86_64": { url: $mac_url, signature: $mac_sig },
                "darwin-aarch64": { url: $mac_url, signature: $mac_sig },
                "windows-x86_64": { url: $msi_url, signature: $msi_sig }
              }
            }' > artifacts/latest.json

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          fail_on_unmatched_files: true
          generate_release_notes: true
